name: CI

on: [push, pull_request]

jobs:
  compile-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download and extract tModLoader
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $url = "https://github.com/tModLoader/tModLoader/releases/download/v2022.09.47.89/tModLoader.zip"
          $zip = "$env:RUNNER_TEMP\tml.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP\tModLoader"

      - name: Create tModLoader.targets (DLL references only, no server build)
        shell: pwsh
        run: |
          $targetsDir = Resolve-Path "$env:GITHUB_WORKSPACE\.."
          $tmlPath = "$env:RUNNER_TEMP\tModLoader"
          $content = @"
          <Project ToolsVersion="14.0" xmlns="http://schemas.microsoft.com/developer/msbuild/2003">
            <PropertyGroup>
              <DefineConstants>`$(DefineConstants);TML_2022_09</DefineConstants>
            </PropertyGroup>
            <ItemGroup>
              <Reference Include="$tmlPath\tModLoader.dll" />
              <Reference Include="$tmlPath\Libraries\**\*.dll" />
              <Reference Remove="$tmlPath\Libraries\Native\**" />
              <Reference Remove="$tmlPath\Libraries\**\runtime*\**" />
              <Reference Remove="$tmlPath\Libraries\**\*.resources.dll" />
            </ItemGroup>
          </Project>
          "@
          Set-Content -Path "$targetsDir\tModLoader.targets" -Value $content

      - name: Restore NuGet packages
        run: dotnet restore SariaMod.csproj

      - name: Build (compile check)
        run: dotnet build SariaMod.csproj --no-restore
